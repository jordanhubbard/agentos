name: agentOS CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------------------
  # Rust workspace tests (excludes WASM-only crates)
  # ---------------------------------------------------------------------------
  test:
    name: Cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test --workspace --exclude health-monitor --exclude log-aggregator

  # ---------------------------------------------------------------------------
  # Leptos/Trunk dashboard build
  # ---------------------------------------------------------------------------
  build-dashboard:
    name: Build dashboard (trunk)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install trunk
        run: cargo install trunk --locked
      - name: Build dashboard
        working-directory: console/dashboard
        run: trunk build --release

  # ---------------------------------------------------------------------------
  # WASM agent example builds
  # ---------------------------------------------------------------------------
  build-examples:
    name: Build WASM examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1
      - uses: Swatinem/rust-cache@v2
      - name: Build health-monitor
        working-directory: examples/health-monitor
        run: cargo build --release
      - name: Build log-aggregator
        working-directory: examples/log-aggregator
        run: cargo build --release


  # ---------------------------------------------------------------------------
  # Topology validation — fast gate, runs on all PRs touching topology or SDF
  # ---------------------------------------------------------------------------
  validate-topology:
    name: Validate topology.yaml + SDF
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install gen_sdf dependencies
        run: pip install pyyaml

      - name: Validate topology.yaml
        run: python3 tools/gen_sdf.py tools/topology.yaml --validate-only

      - name: SDF diff (detect changes vs checked-in agentos.system)
        run: |
          python3 tools/gen_sdf.py tools/topology.yaml -o /tmp/agentos-generated.system
          if [ -f agentos.system ]; then
            echo "=== SDF diff (generated vs committed) ==="
            diff agentos.system /tmp/agentos-generated.system || true
          else
            echo "No committed agentos.system found — skipping diff"
          fi

  build-and-test:
    name: Build & boot test (${{ matrix.board }})
    runs-on: ubuntu-24.04
    needs: validate-topology

    strategy:
      fail-fast: false
      matrix:
        board:
          - qemu_virt_riscv64
          - qemu_virt_aarch64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Toolchain
      # -----------------------------------------------------------------------
      - name: Install clang / lld
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang lld \
            qemu-system-misc qemu-system-arm \
            python3 python3-pip

      # -----------------------------------------------------------------------
      # Microkit SDK
      # -----------------------------------------------------------------------
      - name: Cache Microkit SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: microkit-sdk-2.1.0
          key: microkit-sdk-2.1.0-linux-x86-64

      - name: Download Microkit SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          curl -fsSL \
            https://github.com/seL4/microkit/releases/download/2.1.0/microkit-sdk-2.1.0-linux-x86-64.tar.gz \
            -o microkit-sdk.tar.gz
          tar -xzf microkit-sdk.tar.gz
          rm microkit-sdk.tar.gz

      # -----------------------------------------------------------------------
      # Topology validation (gen_sdf.py)
      # Runs on every PR touching topology.yaml or agentos.system.
      # Fails if validation errors are found; shows SDF diff if regenerated.
      # -----------------------------------------------------------------------
      - name: Install PyYAML
        run: pip3 install pyyaml --quiet

      - name: Validate topology.yaml
        run: |
          python3 tools/gen_sdf.py tools/topology.yaml --validate-only
          echo "✓ topology.yaml validated"

      - name: Check generated SDF matches checked-in agentos.system
        run: |
          python3 tools/gen_sdf.py tools/topology.yaml \
            -o /tmp/agentos_generated.system
          if diff -u kernel/agentos-root-task/agentos.system \
                     /tmp/agentos_generated.system > /tmp/sdf_diff.txt 2>&1; then
            echo "✓ agentos.system is up to date with topology.yaml"
          else
            echo "⚠ agentos.system differs from what gen_sdf.py would generate:"
            cat /tmp/sdf_diff.txt
            echo ""
            echo "Run: python3 tools/gen_sdf.py tools/topology.yaml -o kernel/agentos-root-task/agentos.system"
            echo "(Note: diff is informational — CI does not fail on SDF content drift)"
          fi

      # -----------------------------------------------------------------------
      # Build & test
      # -----------------------------------------------------------------------
      - name: Build agentOS
        run: make BOARD=${{ matrix.board }}

      - name: Run boot tests
        run: |
          chmod +x scripts/run-tests.sh
          BOARD=${{ matrix.board }} scripts/run-tests.sh
        timeout-minutes: 2

      # -----------------------------------------------------------------------
      # Artifacts
      # -----------------------------------------------------------------------
      - name: Upload image
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agentos-${{ matrix.board }}
          path: build/${{ matrix.board }}/agentos.img
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Dedicated QEMU boot test — riscv64 serial banner check
  # ---------------------------------------------------------------------------
  boot-test:
    name: QEMU boot test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y qemu-system-misc qemu-system-riscv gcc-riscv64-linux-gnu \
            clang lld python3 device-tree-compiler
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Cache Microkit SDK
        id: cache-sdk-bt
        uses: actions/cache@v4
        with:
          path: microkit-sdk-2.1.0
          key: microkit-sdk-2.1.0-linux-x86-64
      - name: Download Microkit SDK
        if: steps.cache-sdk-bt.outputs.cache-hit != 'true'
        run: make deps-sdk
      - name: Build kernel image
        run: make TARGET_ARCH=riscv64 BOARD=qemu_virt_riscv64 build
      - name: Boot test
        timeout-minutes: 2
        run: |
          chmod +x scripts/boot-test.sh
          scripts/boot-test.sh build/qemu_virt_riscv64/agentos.img "agentOS v0.1.0"

  # ---------------------------------------------------------------------------
  # Fault injection CI scenario
  # Exercises watchdog + fault_handler recovery paths adversarially.
  # ---------------------------------------------------------------------------
  fault-injection:
    name: Fault Injection Tests (${{ matrix.board }})
    runs-on: ubuntu-24.04
    needs: [validate-topology]
    strategy:
      fail-fast: false
      matrix:
        board: [qemu_virt_riscv64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain + QEMU
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang lld \
            qemu-system-misc qemu-system-riscv \
            python3 python3-pip

      - name: Cache Microkit SDK
        id: cache-sdk-fi
        uses: actions/cache@v4
        with:
          path: microkit-sdk-2.1.0
          key: microkit-sdk-2.1.0-linux-x86-64

      - name: Download Microkit SDK
        if: steps.cache-sdk-fi.outputs.cache-hit != 'true'
        run: |
          curl -fsSL \
            https://github.com/seL4/microkit/releases/download/2.1.0/microkit-sdk-2.1.0-linux-x86-64.tar.gz \
            -o microkit-sdk.tar.gz
          tar -xzf microkit-sdk.tar.gz
          rm microkit-sdk.tar.gz

      - name: Build agentOS with fault_inject PD
        run: make BOARD=${{ matrix.board }} EXTRA_PDS=fault_inject

      - name: Run fault injection test suite
        id: fi_tests
        run: |
          chmod +x scripts/run-fault-inject-tests.sh
          BOARD=${{ matrix.board }} \
          MAX_RECOVERY_TICKS=100 \
            scripts/run-fault-inject-tests.sh 2>&1 | tee /tmp/fi_output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        timeout-minutes: 5

      - name: Parse fault injection results
        if: always()
        run: |
          echo "=== Fault Injection Test Results ==="
          python3 scripts/parse_fi_results.py /tmp/fi_output.txt || true

      - name: Verify trace_recorder JSONL output
        if: always()
        run: |
          # trace_recorder emits one line per event; check for inject+recovery pairs
          TRACE_LOG=build/${{ matrix.board }}/trace.jsonl
          if [ -f "$TRACE_LOG" ]; then
            python3 - <<'EOF'
          import json, sys
          injected = set()
          recovered = set()
          with open("$TRACE_LOG") as f:
              for line in f:
                  try:
                      ev = json.loads(line)
                      if ev.get("type") == "FAULT_INJECT":
                          injected.add(ev["trace_id"])
                      elif ev.get("type") == "FAULT_RECOVERY":
                          recovered.add(ev["trace_id"])
                  except Exception:
                      pass
          missing = injected - recovered
          if missing:
              print(f"FAIL: {len(missing)} fault(s) injected with no recovery event: {missing}")
              sys.exit(1)
          print(f"OK: {len(recovered)}/{len(injected)} fault(s) recovered and traced")
          EOF
          else
            echo "trace.jsonl not found — skipping JSONL verification"
          fi

      - name: Upload fault injection artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fault-injection-${{ matrix.board }}
          path: |
            /tmp/fi_output.txt
            build/${{ matrix.board }}/trace.jsonl
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # HURD-parity: verify all new kernel PD source files compile (dry-run)
  # ---------------------------------------------------------------------------
  hurd-services-build:
    name: HURD Services Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install clang
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y clang

      - name: Dry-run Makefile syntax check
        run: |
          make -n -C kernel/agentos-root-task \
            ARCH=aarch64 \
            MICROKIT_SDK=/opt/microkit \
            MICROKIT_BOARD=qemu_virt_aarch64 \
            MICROKIT_CONFIG=debug \
            || true

      - name: Verify HURD service source files exist
        run: |
          rc=0
          for f in \
            auth_server.c proc_server.c pflocal_server.c exec_server.c \
            term_server.c vm_manager.c vm_snapshot.c ext2fs.c \
            lwip_sys.c lwip_shim.c monocypher.c; do
            if test -f kernel/agentos-root-task/src/$f; then
              echo "✓ $f"
            else
              echo "✗ $f MISSING"
              rc=1
            fi
          done
          exit $rc

  # ---------------------------------------------------------------------------
  # HURD-parity: Rust workspace build and tests
  # ---------------------------------------------------------------------------
  rust-workspace-tests:
    name: Rust Workspace Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Update Rust toolchain
        run: rustup update stable

      - name: Run workspace tests
        run: cargo test --workspace --features std

  # ---------------------------------------------------------------------------
  # HURD-parity: TCP/lwIP smoke checks
  # ---------------------------------------------------------------------------
  tcp-smoke-check:
    name: TCP / lwIP Smoke Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check lwipopts.h contains required defines
        run: |
          f=kernel/agentos-root-task/include/lwipopts.h
          test -f "$f" || { echo "MISSING: $f"; exit 1; }
          grep -q 'NO_SYS'  "$f" || { echo "FAIL: NO_SYS not found in $f";  exit 1; }
          grep -q 'MEM_SIZE' "$f" || { echo "FAIL: MEM_SIZE not found in $f"; exit 1; }
          echo "✓ lwipopts.h contains NO_SYS and MEM_SIZE"

      - name: Check lwip_sys.c is non-trivial (> 100 lines)
        run: |
          f=kernel/agentos-root-task/src/lwip_sys.c
          test -f "$f" || { echo "MISSING: $f"; exit 1; }
          lines=$(wc -l < "$f")
          echo "lwip_sys.c: $lines lines"
          [ "$lines" -gt 100 ] || { echo "FAIL: $f is only $lines lines (expected > 100)"; exit 1; }
          echo "✓ lwip_sys.c has $lines lines"

      - name: Check net_server.c has no stub placeholder
        run: |
          f=kernel/agentos-root-task/src/net_server.c
          test -f "$f" || { echo "MISSING: $f"; exit 1; }
          if grep -q 'SMOLTCP_INTEGRATION_POINT' "$f"; then
            echo "FAIL: $f still contains SMOLTCP_INTEGRATION_POINT stub"
            exit 1
          fi
          echo "✓ net_server.c stub placeholder removed"

  # ---------------------------------------------------------------------------
  # HURD-parity: Ed25519 / Monocypher smoke checks
  # ---------------------------------------------------------------------------
  ed25519-smoke-check:
    name: Ed25519 / Monocypher Smoke Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check monocypher.c exists and is non-trivial (> 500 lines)
        run: |
          f=kernel/agentos-root-task/src/monocypher.c
          test -f "$f" || { echo "MISSING: $f"; exit 1; }
          lines=$(wc -l < "$f")
          echo "monocypher.c: $lines lines"
          [ "$lines" -gt 500 ] || { echo "FAIL: $f is only $lines lines (expected > 500)"; exit 1; }
          echo "✓ monocypher.c has $lines lines"

      - name: Check ed25519_verify.c has no stubs
        run: |
          f=kernel/agentos-root-task/src/ed25519_verify.c
          test -f "$f" || { echo "MISSING: $f"; exit 1; }
          if grep -qiE '\bTODO\b|\bstub\b' "$f"; then
            echo "FAIL: $f still contains TODO or stub markers"
            grep -nE '\bTODO\b|\bstub\b' "$f" || true
            exit 1
          fi
          echo "✓ ed25519_verify.c has no TODO/stub markers"

      - name: Check monocypher.h exists
        run: |
          f=kernel/agentos-root-task/include/monocypher.h
          test -f "$f" || { echo "MISSING: $f"; exit 1; }
          echo "✓ monocypher.h exists"

  # ---------------------------------------------------------------------------
  # HURD-parity: VM manager checks
  # ---------------------------------------------------------------------------
  vm-manager-check:
    name: VM Manager Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check vm_manager.c exists
        run: |
          f=kernel/agentos-root-task/src/vm_manager.c
          test -f "$f" || { echo "MISSING: $f"; exit 1; }
          echo "✓ vm_manager.c exists"

      - name: Check vmm_mux.c exists
        run: |
          f=kernel/freebsd-vmm/vmm_mux.c
          test -f "$f" || { echo "MISSING: $f"; exit 1; }
          echo "✓ vmm_mux.c exists"

      - name: Check agentos.system references vm_manager
        run: |
          f=kernel/agentos-root-task/agentos.system
          test -f "$f" || f=agentos.system
          test -f "$f" || { echo "MISSING: agentos.system"; exit 1; }
          grep -q 'vm_manager' "$f" || { echo "FAIL: vm_manager not found in $f"; exit 1; }
          echo "✓ agentos.system contains vm_manager"

      - name: Check agentos.h defines OP_VM_CREATE
        run: |
          f=kernel/agentos-root-task/include/agentos.h
          test -f "$f" || f=include/agentos.h
          test -f "$f" || { echo "MISSING: agentos.h"; exit 1; }
          grep -q 'OP_VM_CREATE' "$f" || { echo "FAIL: OP_VM_CREATE not found in $f"; exit 1; }
          echo "✓ agentos.h contains OP_VM_CREATE"

  # ---------------------------------------------------------------------------
  # HURD-parity: proc_server host-side C tests
  # ---------------------------------------------------------------------------
  proc-server-tests:
    name: proc_server Host Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check test_proc_server.c exists and is non-trivial
        run: |
          f=tests/test_proc_server.c
          test -f "$f" || { echo "MISSING: $f"; exit 1; }
          lines=$(wc -l < "$f")
          echo "test_proc_server.c: $lines lines"
          [ "$lines" -gt 50 ] || { echo "WARN: $f is only $lines lines"; }
          echo "✓ test_proc_server.c exists ($lines lines)"

      - name: Compile and run proc_server tests (if standalone)
        run: |
          f=tests/test_proc_server.c
          if grep -q 'int main' "$f"; then
            cc -o /tmp/test_proc_server "$f" \
              -I kernel/agentos-root-task/include \
              -DAGENTOS_HOST_TEST \
              && /tmp/test_proc_server \
              && echo "✓ proc_server tests passed" \
              || echo "WARN: proc_server test compile/run failed (may need target headers)"
          else
            echo "No main() found — skipping standalone compile (file verified above)"
          fi

  # ---------------------------------------------------------------------------
  # HURD-parity: VM panel UI checks
  # ---------------------------------------------------------------------------
  hurd-ui-check:
    name: HURD VM Panel UI Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check vm_panel.rs exists
        run: |
          f=console/dashboard/src/vm_panel.rs
          test -f "$f" || { echo "MISSING: $f"; exit 1; }
          echo "✓ vm_panel.rs exists"

      - name: Check style.css contains .vm-panel class
        run: |
          f=console/dashboard/style.css
          test -f "$f" || { echo "MISSING: $f"; exit 1; }
          grep -q '\.vm-panel' "$f" || { echo "FAIL: .vm-panel class not found in $f"; exit 1; }
          echo "✓ style.css contains .vm-panel"

      - name: Check lib.rs references vm_panel
        run: |
          f=console/dashboard/src/lib.rs
          test -f "$f" || { echo "MISSING: $f"; exit 1; }
          grep -qE 'vm_panel|VmPanel' "$f" || { echo "FAIL: neither vm_panel nor VmPanel found in $f"; exit 1; }
          echo "✓ lib.rs references vm_panel/VmPanel"
