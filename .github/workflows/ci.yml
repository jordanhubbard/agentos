name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test-riscv:
    name: Build & Test (RISC-V / QEMU)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            qemu-system-misc \
            opensbi \
            gcc-riscv64-unknown-elf \
            build-essential \
            curl \
            python3 \
            python3-pip \
            libxml2-utils

      - name: Download Microkit SDK
        run: |
          MICROKIT_VERSION=2.1.0
          MICROKIT_URL="https://github.com/seL4/microkit/releases/download/${MICROKIT_VERSION}/microkit-sdk-${MICROKIT_VERSION}-linux-x86-64.tar.gz"
          echo "Downloading Microkit SDK ${MICROKIT_VERSION}..."
          curl -sSL "${MICROKIT_URL}" -o microkit-sdk.tar.gz
          tar -xzf microkit-sdk.tar.gz
          echo "SDK downloaded and extracted."
          ls microkit-sdk-*/

      - name: Build agentOS (RISC-V)
        run: make build

      - name: Run CI test harness (RISC-V)
        run: make test
        env:
          AGENTOS_TIMEOUT: "45"

      - name: Upload serial log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: agentos-ci-log-riscv
          path: /tmp/agentos-ci-riscv64.log
          retention-days: 7

  build-and-test-aarch64:
    name: Build & Test (AArch64 / QEMU)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            qemu-system-arm \
            build-essential \
            curl \
            python3 \
            python3-pip \
            libxml2-utils \
            clang \
            lld

      - name: Download Microkit SDK
        run: |
          MICROKIT_VERSION=2.1.0
          MICROKIT_URL="https://github.com/seL4/microkit/releases/download/${MICROKIT_VERSION}/microkit-sdk-${MICROKIT_VERSION}-linux-x86-64.tar.gz"
          echo "Downloading Microkit SDK ${MICROKIT_VERSION}..."
          curl -sSL "${MICROKIT_URL}" -o microkit-sdk.tar.gz
          tar -xzf microkit-sdk.tar.gz
          echo "SDK downloaded and extracted."
          ls microkit-sdk-*/

      - name: Build agentOS (AArch64)
        run: make build-arm64

      - name: Run CI test harness (AArch64)
        run: make test-arm64
        env:
          AGENTOS_TIMEOUT: "45"

      - name: Upload serial log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: agentos-ci-log-aarch64
          path: /tmp/agentos-ci-aarch64.log
          retention-days: 7
