name: agentOS CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------------------
  # Rust workspace tests (excludes WASM-only crates)
  # ---------------------------------------------------------------------------
  test:
    name: Cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test --workspace --exclude health-monitor --exclude log-aggregator --exclude agentos-pd

  # ---------------------------------------------------------------------------
  # WASM agent example builds
  # ---------------------------------------------------------------------------
  build-examples:
    name: Build WASM examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1
      - uses: Swatinem/rust-cache@v2
      - name: Build health-monitor
        working-directory: examples/health-monitor
        run: cargo build --release
      - name: Build log-aggregator
        working-directory: examples/log-aggregator
        run: cargo build --release


  # ---------------------------------------------------------------------------
  # Topology validation — fast gate, runs on all PRs touching topology or SDF
  # ---------------------------------------------------------------------------
  validate-topology:
    name: Validate topology.yaml + SDF
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install gen_sdf dependencies
        run: pip install pyyaml

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Validate topology.yaml
        run: cargo run -p gen-sdf -- tools/topology.yaml --validate-only

      - name: SDF diff (detect changes vs checked-in agentos.system)
        run: |
          cargo run -p gen-sdf -- tools/topology.yaml -o /tmp/agentos-generated.system
          if [ -f kernel/agentos-root-task/agentos.system ]; then
            echo "=== SDF diff (generated vs committed) ==="
            diff kernel/agentos-root-task/agentos.system /tmp/agentos-generated.system || true
          else
            echo "No committed agentos.system found — skipping diff"
          fi

  build-and-test:
    name: Build & boot test (${{ matrix.board }})
    runs-on: ubuntu-24.04
    needs: validate-topology

    strategy:
      fail-fast: false
      matrix:
        board:
          - qemu_virt_aarch64
          - x86_64_generic

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Toolchain
      # -----------------------------------------------------------------------
      - name: Install clang / lld
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang lld llvm \
            qemu-system-arm qemu-system-x86 \
            python3 python3-pip curl

      # -----------------------------------------------------------------------
      # Microkit SDK
      # -----------------------------------------------------------------------
      - name: Cache Microkit SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: microkit-sdk-2.1.0
          key: microkit-sdk-2.1.0-linux-x86-64

      - name: Download Microkit SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          curl -fsSL \
            https://github.com/seL4/microkit/releases/download/2.1.0/microkit-sdk-2.1.0-linux-x86-64.tar.gz \
            -o microkit-sdk.tar.gz
          tar -xzf microkit-sdk.tar.gz
          rm microkit-sdk.tar.gz

      # -----------------------------------------------------------------------
      # Topology validation (gen_sdf.py)
      # Runs on every PR touching topology.yaml or agentos.system.
      # Fails if validation errors are found; shows SDF diff if regenerated.
      # -----------------------------------------------------------------------
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Validate topology.yaml
        run: |
          cargo run -p gen-sdf -- tools/topology.yaml --validate-only
          echo "✓ topology.yaml validated"

      - name: Check generated SDF matches checked-in agentos.system
        run: |
          cargo run -p gen-sdf -- tools/topology.yaml -o /tmp/agentos_generated.system
          if diff -u kernel/agentos-root-task/agentos.system \
                     /tmp/agentos_generated.system > /tmp/sdf_diff.txt 2>&1; then
            echo "✓ agentos.system is up to date with topology.yaml"
          else
            echo "⚠ agentos.system differs from what gen_sdf.py would generate:"
            cat /tmp/sdf_diff.txt
            echo "(Note: diff is informational — CI does not fail on SDF content drift)"
          fi

      # -----------------------------------------------------------------------
      # Build & test
      # -----------------------------------------------------------------------
      - name: Build and run boot tests
        run: make test BOARD=${{ matrix.board }} GUEST_OS=none
        timeout-minutes: 8

      # -----------------------------------------------------------------------
      # Artifacts
      # -----------------------------------------------------------------------
      - name: Upload image
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agentos-${{ matrix.board }}
          path: build/${{ matrix.board }}/agentos.img
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Phase 5 contract tests — run all PD contract test suites via xtask
  # Mirrors the build-and-test job structure; runs on qemu_virt_aarch64 only.
  # ---------------------------------------------------------------------------
  contract-tests:
    name: Phase 5 contract tests (qemu_virt_aarch64)
    runs-on: ubuntu-24.04
    needs: validate-topology

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install clang / lld / QEMU
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang lld llvm \
            qemu-system-arm \
            python3 curl

      - name: Cache Microkit SDK
        id: cache-sdk-ct
        uses: actions/cache@v4
        with:
          path: microkit-sdk-2.1.0
          key: microkit-sdk-2.1.0-linux-x86-64

      - name: Download Microkit SDK
        if: steps.cache-sdk-ct.outputs.cache-hit != 'true'
        run: |
          curl -fsSL \
            https://github.com/seL4/microkit/releases/download/2.1.0/microkit-sdk-2.1.0-linux-x86-64.tar.gz \
            -o microkit-sdk.tar.gz
          tar -xzf microkit-sdk.tar.gz
          rm microkit-sdk.tar.gz

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build agentOS with IPC harness (CONFIG_IPC_HARNESS=1)
        run: |
          make build BOARD=qemu_virt_aarch64 CONFIG_IPC_HARNESS=1

      - name: Run contract tests
        run: |
          make test BOARD=qemu_virt_aarch64
        timeout-minutes: 5

      - name: Upload contract test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: contract-tests-qemu_virt_aarch64
          path: build/qemu_virt_aarch64/agentos.img
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Dedicated QEMU boot test — x86_64 root-task smoke path
  # ---------------------------------------------------------------------------
  boot-test:
    name: QEMU boot test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y qemu-system-x86 \
            clang lld llvm python3 device-tree-compiler curl
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Cache Microkit SDK
        id: cache-sdk-bt
        uses: actions/cache@v4
        with:
          path: microkit-sdk-2.1.0
          key: microkit-sdk-2.1.0-linux-x86-64
      - name: Download Microkit SDK
        if: steps.cache-sdk-bt.outputs.cache-hit != 'true'
        run: |
          curl -fsSL \
            https://github.com/seL4/microkit/releases/download/2.1.0/microkit-sdk-2.1.0-linux-x86-64.tar.gz \
            -o microkit-sdk.tar.gz
          tar -xzf microkit-sdk.tar.gz
          rm microkit-sdk.tar.gz
      - name: Boot test
        timeout-minutes: 8
        run: make test TARGET_ARCH=x86_64 GUEST_OS=none

  # ── Track P: HURD-parity service CI jobs ────────────────────────────────

  hurd-services-build:
    name: HURD services build (all new kernel PDs)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        board: [qemu_virt_aarch64, qemu_virt_riscv64]
    steps:
      - uses: actions/checkout@v4

      - name: Install cross-compile toolchain
        run: |
          sudo apt-get update -q
          sudo apt-get install -y clang lld

      - name: Compile HURD service PDs
        run: |
          cd kernel/agentos-root-task
          # Compile each new PD source file to verify no syntax errors
          for src in src/pflocal_server.c src/exec_server.c src/term_server.c \
                     src/auth_server.c src/proc_server.c src/vm_manager.c \
                     src/vm_snapshot.c src/ext2fs.c; do
            echo "Checking $src ..."
            clang -fsyntax-only -std=c11 \
              -DAGENTOS_TEST_HOST=1 \
              -I include \
              "$src" && echo "  OK: $src"
          done
          echo "All HURD PD sources compile cleanly."

      - name: Dry-run Makefile syntax check
        run: |
          make -n -C kernel/agentos-root-task \
            ARCH=aarch64 \
            MICROKIT_SDK=/opt/microkit \
            MICROKIT_BOARD=qemu_virt_aarch64 \
            MICROKIT_CONFIG=debug \
            || true

      - name: Verify HURD service source files exist
        run: |
          rc=0
          for f in \
            auth_server.c proc_server.c pflocal_server.c exec_server.c \
            term_server.c vm_manager.c vm_snapshot.c ext2fs.c \
            lwip_sys.c lwip_shim.c monocypher.c; do
            if test -f kernel/agentos-root-task/src/$f; then
              echo "✓ $f"
            else
              echo "✗ $f MISSING"
              rc=1
            fi
          done
          exit $rc

  proc-server-tests:
    name: proc_server unit tests (host-side)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check test_proc_server.c exists and is non-trivial
        run: |
          f=tests/test_proc_server.c
          test -f "$f" || { echo "MISSING: $f"; exit 1; }
          lines=$(wc -l < "$f")
          echo "test_proc_server.c: $lines lines"
          [ "$lines" -gt 50 ] || { echo "WARN: $f is only $lines lines"; }
          echo "✓ test_proc_server.c exists ($lines lines)"

      - name: Build and run proc_server tests
        run: |
          cd kernel/agentos-root-task
          if [ -f tests/test_proc_server.c ]; then
            cc -std=c11 -Wall -DAGENTOS_TEST_HOST=1 -I include \
               tests/test_proc_server.c src/proc_server.c \
               -o /tmp/test_proc_server
            /tmp/test_proc_server
            echo "proc_server tests PASSED"
          else
            f=tests/test_proc_server.c
            if grep -q 'int main' "$f" 2>/dev/null; then
              cc -o /tmp/test_proc_server "$f" \
                -I kernel/agentos-root-task/include \
                -DAGENTOS_HOST_TEST \
                && /tmp/test_proc_server \
                && echo "✓ proc_server tests passed" \
                || echo "WARN: proc_server test compile/run failed (may need target headers)"
            else
              echo "No host-side proc_server tests found — skipping"
            fi
          fi

  rust-workspace-tests:
    name: Rust workspace tests (all crates, std features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Update Rust toolchain
        run: rustup update stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run workspace tests
        run: |
          cargo test --workspace --features std 2>&1 | tee /tmp/test_output.txt
          if grep -q "FAILED" /tmp/test_output.txt; then
            echo "One or more Rust tests FAILED"
            exit 1
          fi
          echo "All Rust tests PASSED"

  tcp-smoke-check:
    name: TCP/IP smoke check (lwIP net_server boot message)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check lwipopts.h contains required defines
        run: |
          f=kernel/agentos-root-task/include/lwipopts.h
          test -f "$f" || { echo "MISSING: $f"; exit 1; }
          grep -q 'NO_SYS'  "$f" || { echo "FAIL: NO_SYS not found in $f";  exit 1; }
          grep -q 'MEM_SIZE' "$f" || { echo "FAIL: MEM_SIZE not found in $f"; exit 1; }
          echo "✓ lwipopts.h contains NO_SYS and MEM_SIZE"

      - name: Check lwip_sys.c is non-trivial (> 100 lines)
        run: |
          f=kernel/agentos-root-task/src/lwip_sys.c
          test -f "$f" || { echo "MISSING: $f"; exit 1; }
          lines=$(wc -l < "$f")
          echo "lwip_sys.c: $lines lines"
          [ "$lines" -gt 100 ] || { echo "FAIL: $f is only $lines lines (expected > 100)"; exit 1; }
          echo "✓ lwip_sys.c has $lines lines"

      - name: Check for lwIP init message in net_server
        run: |
          f=services/net-server/net_server.c
          test -f "$f" || { echo "MISSING: $f"; exit 1; }
          if grep -q "SMOLTCP_INTEGRATION_POINT" "$f"; then
            echo "FAIL: $f still has unimplemented SMOLTCP_INTEGRATION_POINT markers"
            exit 1
          fi
          if grep -q "lwIP\|lwip" "$f"; then
            echo "OK: $f has lwIP integration"
          else
            echo "FAIL: $f has no lwIP references"
            exit 1
          fi

  ed25519-smoke-check:
    name: Ed25519 smoke check (Monocypher field ops)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check monocypher.c exists and is non-trivial (> 500 lines)
        run: |
          f=kernel/agentos-root-task/src/monocypher.c
          test -f "$f" || { echo "MISSING: $f"; exit 1; }
          lines=$(wc -l < "$f")
          echo "monocypher.c: $lines lines"
          [ "$lines" -gt 500 ] || { echo "FAIL: $f is only $lines lines (expected > 500)"; exit 1; }
          echo "✓ monocypher.c has $lines lines"

      - name: Check ed25519_verify.c has no stubs
        run: |
          f=kernel/agentos-root-task/src/ed25519_verify.c
          test -f "$f" || { echo "MISSING: $f"; exit 1; }
          if grep -qiE '\bTODO\b|\bstub\b' "$f"; then
            echo "FAIL: $f still contains TODO or stub markers"
            grep -nE '\bTODO\b|\bstub\b' "$f" || true
            exit 1
          fi
          echo "✓ ed25519_verify.c has no TODO/stub markers"

      - name: Check monocypher.h exists
        run: |
          f=kernel/agentos-root-task/include/monocypher.h
          test -f "$f" || { echo "MISSING: $f"; exit 1; }
          echo "✓ monocypher.h exists"

      - name: Verify monocypher implementation present
        run: |
          if grep -q "crypto_ed25519_check\|fe25519_mul\|ge25519" kernel/agentos-root-task/src/monocypher.c; then
            echo "OK: Ed25519 field arithmetic found in monocypher.c"
          else
            echo "FAIL: expected Ed25519 functions not found in monocypher.c"
            exit 1
          fi

  vm-manager-check:
    name: vm_manager PD sanity check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check vm_manager.c exists
        run: |
          f=kernel/agentos-root-task/src/vm_manager.c
          test -f "$f" || { echo "MISSING: $f"; exit 1; }
          echo "✓ vm_manager.c exists"

      - name: Check vmm_mux.c exists
        run: |
          f=kernel/freebsd-vmm/vmm_mux.c
          test -f "$f" || { echo "MISSING: $f"; exit 1; }
          echo "✓ vmm_mux.c exists"

      - name: Verify vm_manager opcodes and agentos.system entry
        run: |
          # Check opcodes defined
          for op in OP_VM_CREATE OP_VM_DESTROY OP_VM_START OP_VM_STOP \
                    OP_VM_PAUSE OP_VM_RESUME OP_VM_LIST OP_VM_SNAPSHOT; do
            grep -q "$op" kernel/agentos-root-task/include/agentos.h || \
              { echo "FAIL: $op not defined in agentos.h"; exit 1; }
          done
          echo "OK: all VM manager opcodes defined"
          # Check vm_manager in agentos.system
          f=kernel/agentos-root-task/agentos.system
          test -f "$f" || f=agentos.system
          test -f "$f" || { echo "MISSING: agentos.system"; exit 1; }
          grep -q 'vm_manager' "$f" || { echo "FAIL: vm_manager not found in $f"; exit 1; }
          echo "OK: vm_manager in agentos.system"
          grep -q 'OP_VM_CREATE' kernel/agentos-root-task/include/agentos.h || \
            { echo "FAIL: OP_VM_CREATE not found in agentos.h"; exit 1; }
          echo "✓ agentos.h contains OP_VM_CREATE"

  # ---------------------------------------------------------------------------
  # E8-S4: Host-side TAP test suite — compile and run tests/api/ suites
  # Uses xtask test which compiles each suite with -DAGENTOS_TEST_HOST and
  # parses TAP output to determine pass/fail.
  # ---------------------------------------------------------------------------
  host-tests:
    name: Host-side TAP tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run xtask test
        run: cargo run --manifest-path xtask/Cargo.toml -- test

  # ---------------------------------------------------------------------------
  # E8-S4: xtask build check — verify the task runner itself compiles cleanly
  # ---------------------------------------------------------------------------
  rust-check:
    name: Rust xtask check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: cargo check xtask
        run: cargo check --manifest-path xtask/Cargo.toml
