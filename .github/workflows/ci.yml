name: agentOS CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------------------
  # Rust workspace tests (excludes WASM-only crates)
  # ---------------------------------------------------------------------------
  test:
    name: Cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test --workspace --exclude health-monitor --exclude log-aggregator --exclude agentos-pd

  # ---------------------------------------------------------------------------
  # WASM agent example builds
  # ---------------------------------------------------------------------------
  build-examples:
    name: Build WASM examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1
      - uses: Swatinem/rust-cache@v2
      - name: Build health-monitor
        working-directory: examples/health-monitor
        run: cargo build --release
      - name: Build log-aggregator
        working-directory: examples/log-aggregator
        run: cargo build --release


  # ---------------------------------------------------------------------------
  # Topology validation — fast gate, runs on all PRs touching topology or SDF
  # ---------------------------------------------------------------------------
  validate-topology:
    name: Validate topology.yaml + SDF
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install gen_sdf dependencies
        run: pip install pyyaml

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Validate topology.yaml
        run: cargo run -p gen-sdf -- tools/topology.yaml --validate-only

      - name: SDF diff (detect changes vs checked-in agentos.system)
        run: |
          cargo run -p gen-sdf -- tools/topology.yaml -o /tmp/agentos-generated.system
          if [ -f kernel/agentos-root-task/agentos.system ]; then
            echo "=== SDF diff (generated vs committed) ==="
            diff kernel/agentos-root-task/agentos.system /tmp/agentos-generated.system || true
          else
            echo "No committed agentos.system found — skipping diff"
          fi

  build-and-test:
    name: Build & boot test (${{ matrix.board }})
    runs-on: ubuntu-24.04
    needs: validate-topology

    strategy:
      fail-fast: false
      matrix:
        board:
          - qemu_virt_riscv64
          - qemu_virt_aarch64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Toolchain
      # -----------------------------------------------------------------------
      - name: Install clang / lld
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang lld \
            qemu-system-misc qemu-system-arm \
            python3 python3-pip

      # -----------------------------------------------------------------------
      # Microkit SDK
      # -----------------------------------------------------------------------
      - name: Cache Microkit SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: microkit-sdk-2.1.0
          key: microkit-sdk-2.1.0-linux-x86-64

      - name: Download Microkit SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          curl -fsSL \
            https://github.com/seL4/microkit/releases/download/2.1.0/microkit-sdk-2.1.0-linux-x86-64.tar.gz \
            -o microkit-sdk.tar.gz
          tar -xzf microkit-sdk.tar.gz
          rm microkit-sdk.tar.gz

      # -----------------------------------------------------------------------
      # Topology validation (gen_sdf.py)
      # Runs on every PR touching topology.yaml or agentos.system.
      # Fails if validation errors are found; shows SDF diff if regenerated.
      # -----------------------------------------------------------------------
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Validate topology.yaml
        run: |
          cargo run -p gen-sdf -- tools/topology.yaml --validate-only
          echo "✓ topology.yaml validated"

      - name: Check generated SDF matches checked-in agentos.system
        run: |
          cargo run -p gen-sdf -- tools/topology.yaml -o /tmp/agentos_generated.system
          if diff -u kernel/agentos-root-task/agentos.system \
                     /tmp/agentos_generated.system > /tmp/sdf_diff.txt 2>&1; then
            echo "✓ agentos.system is up to date with topology.yaml"
          else
            echo "⚠ agentos.system differs from what gen_sdf.py would generate:"
            cat /tmp/sdf_diff.txt
            echo "(Note: diff is informational — CI does not fail on SDF content drift)"
          fi

      # -----------------------------------------------------------------------
      # Build & test
      # -----------------------------------------------------------------------
      - name: Build agentOS
        run: make BOARD=${{ matrix.board }}

      - name: Run boot tests
        run: |
          chmod +x scripts/run-tests.sh
          BOARD=${{ matrix.board }} scripts/run-tests.sh
        timeout-minutes: 2

      # -----------------------------------------------------------------------
      # Artifacts
      # -----------------------------------------------------------------------
      - name: Upload image
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agentos-${{ matrix.board }}
          path: build/${{ matrix.board }}/agentos.img
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Dedicated QEMU boot test — riscv64 serial banner check
  # ---------------------------------------------------------------------------
  boot-test:
    name: QEMU boot test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y qemu-system-misc qemu-system-riscv gcc-riscv64-linux-gnu \
            clang lld python3 device-tree-compiler
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Cache Microkit SDK
        id: cache-sdk-bt
        uses: actions/cache@v4
        with:
          path: microkit-sdk-2.1.0
          key: microkit-sdk-2.1.0-linux-x86-64
      - name: Download Microkit SDK
        if: steps.cache-sdk-bt.outputs.cache-hit != 'true'
        run: make deps-sdk
      - name: Build kernel image
        run: make TARGET_ARCH=riscv64 BOARD=qemu_virt_riscv64 build
      - name: Boot test
        timeout-minutes: 2
        run: |
          chmod +x scripts/boot-test.sh
          scripts/boot-test.sh build/qemu_virt_riscv64/agentos.img "agentOS v0.1.0"

  # ---------------------------------------------------------------------------
  # Fault injection CI scenario
  # Exercises watchdog + fault_handler recovery paths adversarially.
  # ---------------------------------------------------------------------------
  fault-injection:
    name: Fault Injection Tests (${{ matrix.board }})
    runs-on: ubuntu-24.04
    needs: [validate-topology]
    strategy:
      fail-fast: false
      matrix:
        board: [qemu_virt_riscv64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain + QEMU
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang lld \
            qemu-system-misc qemu-system-riscv \
            python3 python3-pip

      - name: Cache Microkit SDK
        id: cache-sdk-fi
        uses: actions/cache@v4
        with:
          path: microkit-sdk-2.1.0
          key: microkit-sdk-2.1.0-linux-x86-64

      - name: Download Microkit SDK
        if: steps.cache-sdk-fi.outputs.cache-hit != 'true'
        run: |
          curl -fsSL \
            https://github.com/seL4/microkit/releases/download/2.1.0/microkit-sdk-2.1.0-linux-x86-64.tar.gz \
            -o microkit-sdk.tar.gz
          tar -xzf microkit-sdk.tar.gz
          rm microkit-sdk.tar.gz

      - name: Build agentOS with fault_inject PD
        run: make BOARD=${{ matrix.board }} EXTRA_PDS=fault_inject

      - name: Run fault injection test suite
        id: fi_tests
        run: |
          chmod +x scripts/run-fault-inject-tests.sh
          BOARD=${{ matrix.board }} \
          MAX_RECOVERY_TICKS=100 \
            scripts/run-fault-inject-tests.sh 2>&1 | tee /tmp/fi_output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        timeout-minutes: 5

      - name: Parse fault injection results
        if: always()
        run: |
          echo "=== Fault Injection Test Results ==="
          python3 scripts/parse_fi_results.py /tmp/fi_output.txt || true

      - name: Verify trace_recorder JSONL output
        if: always()
        run: |
          # trace_recorder emits one line per event; check for inject+recovery pairs
          TRACE_LOG=build/${{ matrix.board }}/trace.jsonl
          if [ -f "$TRACE_LOG" ]; then
            python3 - <<'EOF'
          import json, sys
          injected = set()
          recovered = set()
          with open("$TRACE_LOG") as f:
              for line in f:
                  try:
                      ev = json.loads(line)
                      if ev.get("type") == "FAULT_INJECT":
                          injected.add(ev["trace_id"])
                      elif ev.get("type") == "FAULT_RECOVERY":
                          recovered.add(ev["trace_id"])
                  except Exception:
                      pass
          missing = injected - recovered
          if missing:
              print(f"FAIL: {len(missing)} fault(s) injected with no recovery event: {missing}")
              sys.exit(1)
          print(f"OK: {len(recovered)}/{len(injected)} fault(s) recovered and traced")
          EOF
          else
            echo "trace.jsonl not found — skipping JSONL verification"
          fi

      - name: Upload fault injection artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fault-injection-${{ matrix.board }}
          path: |
            /tmp/fi_output.txt
            build/${{ matrix.board }}/trace.jsonl
          if-no-files-found: ignore

  # ── Track P: HURD-parity service CI jobs ────────────────────────────────

  hurd-services-build:
    name: HURD services build (all new kernel PDs)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        board: [qemu_virt_aarch64, qemu_virt_riscv64]
    steps:
      - uses: actions/checkout@v4

      - name: Install cross-compile toolchain
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gcc-aarch64-linux-gnu gcc-riscv64-linux-gnu clang lld

      - name: Compile HURD service PDs
        run: |
          cd kernel/agentos-root-task
          # Compile each new PD source file to verify no syntax errors
          for src in src/pflocal_server.c src/exec_server.c src/term_server.c \
                     src/auth_server.c src/proc_server.c src/vm_manager.c \
                     src/vm_snapshot.c src/ext2fs.c; do
            echo "Checking $src ..."
            clang -fsyntax-only -std=c11 \
              -DAGENTOS_TEST_HOST=1 \
              -I include \
              "$src" && echo "  OK: $src"
          done
          echo "All HURD PD sources compile cleanly."

  proc-server-tests:
    name: proc_server unit tests (host-side)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and run proc_server tests
        run: |
          cd kernel/agentos-root-task
          if [ -f tests/test_proc_server.c ]; then
            cc -std=c11 -Wall -DAGENTOS_TEST_HOST=1 -I include \
               tests/test_proc_server.c src/proc_server.c \
               -o /tmp/test_proc_server
            /tmp/test_proc_server
            echo "proc_server tests PASSED"
          else
            echo "No host-side proc_server tests found — skipping"
          fi

  rust-workspace-tests:
    name: Rust workspace tests (all crates, std features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run workspace tests
        run: |
          cargo test --workspace --features std 2>&1 | tee /tmp/test_output.txt
          if grep -q "FAILED" /tmp/test_output.txt; then
            echo "One or more Rust tests FAILED"
            exit 1
          fi
          echo "All Rust tests PASSED"

  tcp-smoke-check:
    name: TCP/IP smoke check (lwIP net_server boot message)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for lwIP init message in net_server
        run: |
          # Verify lwIP integration site comments replaced with real calls
          if grep -q "SMOLTCP_INTEGRATION_POINT" kernel/agentos-root-task/src/net_server.c; then
            echo "FAIL: net_server.c still has unimplemented SMOLTCP_INTEGRATION_POINT stubs"
            exit 1
          fi
          if grep -q "lwIP\|lwip" kernel/agentos-root-task/src/net_server.c; then
            echo "OK: net_server.c has lwIP integration"
          else
            echo "FAIL: net_server.c has no lwIP references"
            exit 1
          fi

  ed25519-smoke-check:
    name: Ed25519 smoke check (Monocypher field ops)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify monocypher implementation present
        run: |
          if [ ! -f kernel/agentos-root-task/src/monocypher.c ]; then
            echo "FAIL: monocypher.c missing"
            exit 1
          fi
          echo "OK: monocypher.c present ($(wc -l < kernel/agentos-root-task/src/monocypher.c) lines)"
          if grep -q "crypto_ed25519_check\|fe25519_mul\|ge25519" kernel/agentos-root-task/src/monocypher.c; then
            echo "OK: Ed25519 field arithmetic found in monocypher.c"
          else
            echo "FAIL: expected Ed25519 functions not found in monocypher.c"
            exit 1
          fi

  vm-manager-check:
    name: vm_manager PD sanity check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify vm_manager opcodes and agentos.system entry
        run: |
          # Check opcodes defined
          for op in OP_VM_CREATE OP_VM_DESTROY OP_VM_START OP_VM_STOP \
                    OP_VM_PAUSE OP_VM_RESUME OP_VM_LIST OP_VM_SNAPSHOT; do
            grep -q "$op" kernel/agentos-root-task/include/agentos.h || \
              { echo "FAIL: $op not defined in agentos.h"; exit 1; }
          done
          echo "OK: all VM manager opcodes defined"
          # Check vm_manager in agentos.system
          grep -q "vm_manager" kernel/agentos-root-task/agentos.system || \
            { echo "FAIL: vm_manager not in agentos.system"; exit 1; }
          echo "OK: vm_manager in agentos.system"

