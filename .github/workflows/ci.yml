name: agentOS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Topology validation — fast gate, runs on all PRs touching topology or SDF
  # ---------------------------------------------------------------------------
  validate-topology:
    name: Validate topology.yaml + SDF
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install gen_sdf dependencies
        run: pip install pyyaml

      - name: Validate topology.yaml
        run: python3 tools/gen_sdf.py tools/topology.yaml --validate-only

      - name: SDF diff (detect changes vs checked-in agentos.system)
        run: |
          python3 tools/gen_sdf.py tools/topology.yaml -o /tmp/agentos-generated.system
          if [ -f agentos.system ]; then
            echo "=== SDF diff (generated vs committed) ==="
            diff agentos.system /tmp/agentos-generated.system || true
          else
            echo "No committed agentos.system found — skipping diff"
          fi

  build-and-test:
    name: Build & boot test (${{ matrix.board }})
    runs-on: ubuntu-24.04
    needs: validate-topology

    strategy:
      fail-fast: false
      matrix:
        board:
          - qemu_virt_riscv64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Toolchain
      # -----------------------------------------------------------------------
      - name: Install clang / lld
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang lld \
            qemu-system-misc qemu-system-arm \
            python3 python3-pip

      # -----------------------------------------------------------------------
      # Microkit SDK
      # -----------------------------------------------------------------------
      - name: Cache Microkit SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: microkit-sdk-2.1.0
          key: microkit-sdk-2.1.0-linux-x86-64

      - name: Download Microkit SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          curl -fsSL \
            https://github.com/seL4/microkit/releases/download/2.1.0/microkit-sdk-2.1.0-linux-x86-64.tar.gz \
            -o microkit-sdk.tar.gz
          tar -xzf microkit-sdk.tar.gz
          rm microkit-sdk.tar.gz

      # -----------------------------------------------------------------------
      # Topology validation (gen_sdf.py)
      # Runs on every PR touching topology.yaml or agentos.system.
      # Fails if validation errors are found; shows SDF diff if regenerated.
      # -----------------------------------------------------------------------
      - name: Install PyYAML
        run: pip3 install pyyaml --quiet

      - name: Validate topology.yaml
        run: |
          python3 tools/gen_sdf.py tools/topology.yaml --validate-only
          echo "✓ topology.yaml validated"

      - name: Check generated SDF matches checked-in agentos.system
        run: |
          python3 tools/gen_sdf.py tools/topology.yaml \
            -o /tmp/agentos_generated.system
          if diff -u kernel/agentos-root-task/agentos.system \
                     /tmp/agentos_generated.system > /tmp/sdf_diff.txt 2>&1; then
            echo "✓ agentos.system is up to date with topology.yaml"
          else
            echo "⚠ agentos.system differs from what gen_sdf.py would generate:"
            cat /tmp/sdf_diff.txt
            echo ""
            echo "Run: python3 tools/gen_sdf.py tools/topology.yaml -o kernel/agentos-root-task/agentos.system"
            echo "(Note: diff is informational — CI does not fail on SDF content drift)"
          fi

      # -----------------------------------------------------------------------
      # Build & test
      # -----------------------------------------------------------------------
      - name: Build agentOS
        run: make BOARD=${{ matrix.board }}

      - name: Run boot tests
        run: |
          chmod +x scripts/run-tests.sh
          BOARD=${{ matrix.board }} scripts/run-tests.sh
        timeout-minutes: 2

      # -----------------------------------------------------------------------
      # Artifacts
      # -----------------------------------------------------------------------
      - name: Upload image
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agentos-${{ matrix.board }}
          path: build/${{ matrix.board }}/agentos.img
          if-no-files-found: ignore
