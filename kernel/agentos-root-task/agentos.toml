# agentOS system descriptor (TOML)
# Consumed by: cargo xtask gen-image
#
# This file lists all Protection Domains in the default (RISC-V) agentOS image.
# Each PD ELF must exist as <name>.elf in the build output directory.
#
# Priority values mirror those in agentos.system for documentation parity.
# The gen-image tool uses the 'priority' field to record scheduling intent in
# the image header; actual scheduling is enforced by the root task at boot.
#
# Arch-specific overrides live in boards/<board-name>/agentos.toml.

[[pd]]
name = "controller"
priority = 50

