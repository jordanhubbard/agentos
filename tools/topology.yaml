    id_b: 0

  # controller <-> vibe_engine
  - name: ctrl_vibe
    pd_a: controller
    id_a: 40
    pd_b: vibe_engine
    id_b: 0

  # init_agent <-> vibe_engine
  - name: init_vibe
    pd_a: init_agent
    id_a: 2
    pp_a: true
    pd_b: vibe_engine
