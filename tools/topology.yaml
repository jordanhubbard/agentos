  # GPU shared memory channels — seL4 ↔ linux_vmm
  # controller notifies linux_vmm when a tensor is ready in the ring
  - name: ctrl_gpu_notify
    pd_a: controller
    id_a: 61
    pd_b: linux_vmm
    id_b: 3

  # linux_vmm notifies controller when a GPU result is ready
  - name: vmm_gpu_result
    pd_a: linux_vmm
    id_a: 4
    pd_b: controller
    id_b: 62

  # dev_shell channels (dev-only)
  # host (controller) notifies dev_shell of new commands
  - name: ctrl_devshell
    pd_a: controller
    id_a: 2
    pd_b: dev_shell
    id_b: 0
    tags: [dev-only]

  # dev_shell → controller pass-through for ipc send command
  - name: devshell_ctrl
    pd_a: dev_shell
