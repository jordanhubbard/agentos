  - name: eb_worker_3
    pd_a: event_bus
    id_a: 6
    pd_b: worker_3
    id_b: 1

  - name: eb_worker_4
    pd_a: event_bus
    id_a: 7
    pd_b: worker_4
    id_b: 1

  - name: eb_worker_5
    pd_a: event_bus
    id_a: 8
    pd_b: worker_5
    id_b: 1

  - name: eb_worker_6
    pd_a: event_bus
    id_a: 9
    pd_b: worker_6
    id_b: 1

  - name: eb_worker_7
    pd_a: event_bus
    id_a: 10
    pd_b: worker_7
    id_b: 1

  # controller <-> swap_slots
  - name: ctrl_swap_0
    pd_a: controller
    id_a: 30
    pd_b: swap_slot_0
    id_b: 0

  - name: ctrl_swap_1
    pd_a: controller
    id_a: 31
    pd_b: swap_slot_1
    id_b: 0

  - name: ctrl_swap_2
    pd_a: controller
