# agentOS topology spec — machine-readable SDF source
# Maintained here; run gen_sdf.py to regenerate agentos.system
#
# Edit this file to add/remove PDs or channels.
# Run: python3 tools/gen_sdf.py tools/topology.yaml -o kernel/agentos-root-task/agentos.system

version: "0.3"

# ── Memory regions ─────────────────────────────────────────────────────── #

memory_regions:
  - name: vibe_code
    size: 0x400000      # 4MB: WASM binary + linear memory
    page_size: 0x1000

  - name: vibe_state
    size: 0x10000       # 64KB: swap slot shared state ring
    page_size: 0x1000

  - name: agentfs_store
    size: 0x200000      # 2MB: AgentFS persistent module store
    page_size: 0x1000

  # Developer shell command/output ring (QEMU/dev builds only)
  - name: dev_shell_ring
    size: 0x1000        # 4KB: cmd ring + output ring
    page_size: 0x1000

  # GPU zero-copy tensor exchange buffer (seL4 ↔ Linux VMM ↔ CUDA)
  # Mapped into linux_vmm (rw) and controller (rw) for zero-copy tensor IPC.
  # Physical layout: [0..4KB] ring header, [4KB..64MB] tensor payload area.
  - name: gpu_tensor_buf
    size: 0x4000000     # 64MB: tensor payload + ring header
    page_size: 0x200000 # 2MB pages for GPU DMA alignment

  - name: console_ring
    size: 0x4000        # 16KB: console mux ring buffer
    page_size: 0x1000

  - name: perf_ring
    size: 0x1000        # 4KB: perf_counters export ring (64 × 64B records)
    page_size: 0x1000

  - name: audit_log
    size: 0x8000        # 32KB: cap_audit_log ring
    page_size: 0x1000

  - name: migrate_buf
    size: 0x40000       # 256KB: live-migration snapshot buffer
    page_size: 0x1000

# ── Protection Domains ─────────────────────────────────────────────────── #

pds:
  # System coordinator — lowest priority, PPCs into passive servers
  - name: controller
    priority: 50
    passive: false
    program_image: controller.elf
    maps:
      - mr: vibe_code
        vaddr: 0x2000000
        perms: r
        setvar_vaddr: vibe_code_vaddr
      - mr: vibe_state
        vaddr: 0x3000000
        perms: rw
        setvar_vaddr: vibe_state_vaddr
      # GPU zero-copy tensor buffer (producer side)
      - mr: gpu_tensor_buf
        vaddr: 0x60000000
        perms: rw
        setvar_vaddr: gpu_tensor_buf_vaddr

  # Swap slots — WASM execution sandboxes
  - name: swap_slot_0
    priority: 75
    passive: false
    program_image: swap_slot.elf
    maps:
      - mr: vibe_code
        vaddr: 0x2000000
        perms: rwx
        setvar_vaddr: code_region_vaddr
      - mr: vibe_state
        vaddr: 0x3000000
        perms: rw
        setvar_vaddr: state_region_vaddr

  - name: swap_slot_1
    priority: 75
    passive: false
    program_image: swap_slot.elf
    maps:
      - mr: vibe_code
        vaddr: 0x2000000
        perms: rwx
        setvar_vaddr: code_region_vaddr
      - mr: vibe_state
        vaddr: 0x3000000
        perms: rw
        setvar_vaddr: state_region_vaddr

  - name: swap_slot_2
    priority: 75
    passive: false
    program_image: swap_slot.elf
    maps:
      - mr: vibe_code
        vaddr: 0x2000000
        perms: rwx
        setvar_vaddr: code_region_vaddr
      - mr: vibe_state
        vaddr: 0x3000000
        perms: rw
        setvar_vaddr: state_region_vaddr

  - name: swap_slot_3
    priority: 75
    passive: false
    program_image: swap_slot.elf
    maps:
      - mr: vibe_code
        vaddr: 0x2000000
        perms: rwx
        setvar_vaddr: code_region_vaddr
      - mr: vibe_state
        vaddr: 0x3000000
        perms: rw
        setvar_vaddr: state_region_vaddr

  # Worker pool
  - name: worker_0
    priority: 80
    passive: false
    program_image: worker.elf

  - name: worker_1
    priority: 80
    passive: false
    program_image: worker.elf

  - name: worker_2
    priority: 80
    passive: false
    program_image: worker.elf

  - name: worker_3
    priority: 80
    passive: false
    program_image: worker.elf

  - name: worker_4
    priority: 80
    passive: false
    program_image: worker.elf

  - name: worker_5
    priority: 80
    passive: false
    program_image: worker.elf

  - name: worker_6
    priority: 80
    passive: false
    program_image: worker.elf

  - name: worker_7
    priority: 80
    passive: false
    program_image: worker.elf

  # Init agent — bootstrapper
  - name: init_agent
    priority: 100
    passive: false
    program_image: init_agent.elf

  # Memory profiler (passive)
  - name: mem_profiler
    priority: 108
    passive: true
    program_image: mem_profiler.elf

  # VibeEngine (passive)
  - name: vibe_engine
    priority: 140
    passive: true
    program_image: vibe_engine.elf

  # Linux VMM — boots Linux guest for CUDA/PyTorch GPU workloads
  # Mapped to both guest_ram and gpu_tensor_buf for zero-copy tensor exchange.
  - name: linux_vmm
    priority: 100
    passive: false
    program_image: linux_vmm.elf
    maps:
      - mr: gpu_tensor_buf
        vaddr: 0x60000000
        perms: rw
        setvar_vaddr: gpu_tensor_buf_vaddr

  # AgentFS (passive)
  - name: agentfs
    priority: 150
    passive: true
    program_image: agentfs.elf
    maps:
      - mr: agentfs_store
        vaddr: 0x5000000
        perms: rw
        setvar_vaddr: store_vaddr

  # Developer shell (passive, QEMU/dev builds only — tag: dev-only)
  # Exposes a REPL via dev_shell_ring MR for interactive debugging.
  # Not included in production builds (gen_sdf.py skips dev-only PDs by default).
  - name: dev_shell
    priority: 70
    passive: true
    program_image: dev_shell.elf
    tags: [dev-only]
    maps:
      - mr: dev_shell_ring
        vaddr: 0x7000000
        perms: rw
        setvar_vaddr: dev_shell_ring_vaddr
      - mr: perf_ring
        vaddr: 0x8000000
        perms: r
        setvar_vaddr: perf_ring_vaddr
      - mr: vibe_code
        vaddr: 0x2000000
        perms: r
        setvar_vaddr: vibe_code_vaddr
      - mr: vibe_state
        vaddr: 0x3000000
        perms: r
        setvar_vaddr: vibe_state_vaddr

  # Console mux (passive)
  - name: console_mux
    priority: 160
    passive: true
    program_image: console_mux.elf
    maps:
      - mr: console_ring
        vaddr: 0x6000000
        perms: rw
        setvar_vaddr: console_ring_vaddr

  # OOM Killer (passive, priority 245 — acts fast under memory pressure)
  - name: oom_killer
    priority: 245
    passive: true
    program_image: oom_killer.elf
    maps:
      - mr: perf_ring
        vaddr: 0x8100000
        perms: r
        setvar_vaddr: mem_ring_vaddr

  # Snapshot Scheduler (passive, priority 180).
  # Fires on each controller tick; writes WASM slot KV snapshots to AgentFS.
  # Enables crash recovery losing at most ~5 s of state (500-tick interval).
  # Built only when AGENTOS_SNAPSHOT_SCHED=1.
  - name: snapshot_sched
    priority: 180
    passive: true
    program_image: snapshot_sched.elf
    tags: [optional-snapshot-sched]

  # EventBus (passive)
  - name: event_bus
    priority: 200
    passive: true
    program_image: event_bus.elf

  # TimePartition (passive, highest user-space priority)
  - name: time_partition
    priority: 250
    passive: true
    program_image: time_partition.elf

  # PerfCounters (passive)
  - name: perf_counters
    priority: 95
    passive: true
    program_image: perf_counters.elf
    maps:
      - mr: perf_ring
        vaddr: 0xA000000
        perms: rw
        setvar_vaddr: perf_ring_vaddr

  # Monitor (active, highest priority)
  - name: monitor
    priority: 254
    passive: false
    program_image: monitor.elf

# ── Channels ─────────────────────────────────────────────────────────────── #

channels:
  # Core: controller <-> event_bus
  - name: ctrl_eventbus
    pd_a: controller
    id_a: 0
    pp_a: true
    pd_b: event_bus
    id_b: 0

  # controller <-> init_agent
  - name: ctrl_init
    pd_a: controller
    id_a: 1
    pd_b: init_agent
    id_b: 0

  # event_bus <-> init_agent
  - name: eb_init
    pd_a: event_bus
    id_a: 1
    pd_b: init_agent
    id_b: 1
    pp_b: true

  # controller <-> agentfs
  - name: ctrl_agentfs
    pd_a: controller
    id_a: 5
    pp_a: true
    pd_b: agentfs
    id_b: 0

  # agentfs <-> event_bus
  - name: agentfs_eb
    pd_a: agentfs
    id_a: 1
    pd_b: event_bus
    id_b: 2

  # controller <-> workers (task assignment)
  - name: ctrl_worker_0
    pd_a: controller
    id_a: 10
    pd_b: worker_0
    id_b: 0

  - name: ctrl_worker_1
    pd_a: controller
    id_a: 11
    pd_b: worker_1
    id_b: 0

  - name: ctrl_worker_2
