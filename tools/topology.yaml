    pd_b: mem_profiler
    id_b: 4

  - name: worker4_memprof
    pd_a: worker_4
    id_a: 9
    pp_a: true
    pd_b: mem_profiler
    id_b: 5

  - name: worker5_memprof
    pd_a: worker_5
    id_a: 9
